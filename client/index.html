<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ClipCrafters — Transform research papers, reports, and lecture notes into stunning, accurate AI-powered videos. AI writes, grounds, and verifies — you stay in control."
    />
    <meta
      name="keywords"
      content="AI video creation, research videos, academic video, clip crafters, AI agentic video"
    />
    <meta
      property="og:title"
      content="ClipCrafters — AI-Powered Video Creation"
    />
    <meta
      property="og:description"
      content="Create expert videos from research papers and lecture notes using agentic AI."
    />
    <meta property="og:type" content="website" />
    <title>ClipCrafters — AI-Powered Video Creation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script>
      // Prevent theme flash
      (function () {
        try {
          var t = localStorage.getItem("cc_theme") || "dark";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
